name: proof-gates

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
  push:
    branches:
      - "**"

permissions:
  contents: read

jobs:
  full:
    name: full-${{ matrix.label }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: linux
            runner: ubuntu-latest
          - label: macos
            runner: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Run full proof gate with provider policy baseline
        shell: bash
        run: |
          set -euo pipefail
          nix run .#test

  provider-admission-policy:
    name: provider-admission-policy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Materialize explicit provider-admission inputs
        shell: bash
        env:
          TARGETS_JSON: ${{ secrets.GIT_RELAY_PROVIDER_TARGETS_JSON }}
          CREDENTIALS_ENV: ${{ secrets.GIT_RELAY_PROVIDER_CREDENTIALS_ENV }}
        run: |
          set -euo pipefail
          if [[ -z "${TARGETS_JSON:-}" || -z "${CREDENTIALS_ENV:-}" ]]; then
            echo "provider-admission secrets not configured; running fixture-only policy baseline, not real declared-target admission"
            exit 0
          fi
          targets_file="$RUNNER_TEMP/provider-targets.json"
          credentials_file="$RUNNER_TEMP/provider-credentials.env"
          printf '%s' "$TARGETS_JSON" > "$targets_file"
          printf '%s' "$CREDENTIALS_ENV" > "$credentials_file"
          echo "GIT_RELAY_PROOF_PROVIDER_TARGETS=$targets_file" >> "$GITHUB_ENV"
          echo "GIT_RELAY_PROOF_PROVIDER_CREDENTIALS=$credentials_file" >> "$GITHUB_ENV"

      - name: Enforce provider-admission policy
        shell: bash
        run: |
          set -euo pipefail
          nix run .#test -- provider-admission fixtures/hosted/targets.json
