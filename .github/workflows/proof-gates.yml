name: proof-gates

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  full:
    name: full-${{ matrix.label }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: linux
            runner: ubuntu-latest
          - label: macos
            runner: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Run full proof gate
        shell: bash
        run: |
          set -euo pipefail
          system="$(nix eval --impure --expr builtins.currentSystem --raw)"
          nix build ".#checks.${system}.rfc-proof-e2e-full"

  provider-admission-policy:
    name: provider-admission-policy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Materialize explicit provider-admission inputs
        if: ${{ secrets.GIT_RELAY_PROVIDER_TARGETS_JSON != '' && secrets.GIT_RELAY_PROVIDER_CREDENTIALS_ENV != '' }}
        shell: bash
        env:
          TARGETS_JSON: ${{ secrets.GIT_RELAY_PROVIDER_TARGETS_JSON }}
          CREDENTIALS_ENV: ${{ secrets.GIT_RELAY_PROVIDER_CREDENTIALS_ENV }}
        run: |
          set -euo pipefail
          targets_file="$RUNNER_TEMP/provider-targets.json"
          credentials_file="$RUNNER_TEMP/provider-credentials.env"
          printf '%s' "$TARGETS_JSON" > "$targets_file"
          printf '%s' "$CREDENTIALS_ENV" > "$credentials_file"
          echo "GIT_RELAY_PROOF_PROVIDER_TARGETS=$targets_file" >> "$GITHUB_ENV"
          echo "GIT_RELAY_PROOF_PROVIDER_CREDENTIALS=$credentials_file" >> "$GITHUB_ENV"

      - name: Enforce provider-admission policy
        shell: bash
        run: |
          set -euo pipefail
          scripts/ci/provider-admission-gate.sh fixtures/hosted/targets.json
